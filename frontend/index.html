<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>PRAMAN</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container">

<span class="navbar-brand fs-3">

<i class="bi bi-shield-check"></i>

PRAMAN

</span>

<span class="text-white">

Aadhaar Verification System

</span>

</div>

</nav>

<!-- Main -->

<div class="container mt-5">

<div class="row">

<!-- Left -->

<div class="col-lg-5">

<div class="card shadow">

<div class="card-body">

<h4>

<i class="bi bi-person-vcard"></i>

Upload Aadhaar

</h4>

<input

class="form-control"

type="file"

id="aadhaar"

accept="image/*">

<img

id="aadhaarPreview"

class="preview mt-3">

<hr>

<h4>

<i class="bi bi-camera-fill"></i>

Upload Selfie

</h4>

<input

class="form-control"

type="file"

id="selfie"

accept="image/*">

<img

id="selfiePreview"

class="preview mt-3">

<button

class="btn btn-primary w-100 mt-4"

id="verifyBtn">

<i class="bi bi-check-circle-fill"></i>

Verify Aadhaar

</button>

</div>

</div>

</div>

<!-- Right -->

<div class="col-lg-7">

<div class="card shadow">

<div class="card-body">

<h3>

Verification Result

</h3>

<hr>

<div id="loading">

<div class="spinner-border text-primary">

</div>

<p class="mt-3">

Verifying Document...

</p>

</div>

<div id="result">

<div class="row">

<div class="col-md-6">

<div class="info-card">

<h5>Status</h5>

<h2 id="status">

-


</h2>

</div>

</div>

<div class="col-md-6">

<div class="info-card">

<h5>Confidence</h5>

<h2 id="confidence">

0%

</h2>

</div>

</div>

</div>

<hr>

<h5>

OCR Details

</h5>

<table class="table">

<tr>

<th>Name</th>

<td id="name">

-

</td>

</tr>

<tr>

<th>DOB</th>

<td id="dob">

-

</td>

</tr>

<tr>

<th>Gender</th>

<td id="gender">

-

</td>

</tr>

<tr>

<th>Aadhaar</th>

<td id="aadhaarNumber">

-

</td>

</tr>

</table>

<hr>

<div class="row">

<div class="col">

<div class="metric">

Image Quality

<h4 id="quality">

-

</h4>

</div>

</div>

<div class="col">

<div class="metric">

Face Match

<h4 id="similarity">

-

</h4>

</div>

</div>

<div class="col">

<div class="metric">

Tampering

<h4 id="tampering">

-

</h4>

</div>

</div>

</div>

<hr>

<button

class="btn btn-success"

id="downloadBtn">

<i class="bi bi-download"></i>

Download Report

</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
